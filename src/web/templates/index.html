<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashcam Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e4e4e7; }
        .header { background: #18181b; border-bottom: 1px solid #27272a; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .badge { background: #3b82f6; color: white; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
        .layout { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 57px); }
        .sidebar { background: #18181b; border-right: 1px solid #27272a; overflow-y: auto; }
        .filters { padding: 16px; border-bottom: 1px solid #27272a; display: flex; gap: 8px; flex-wrap: wrap; }
        .filters select { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
        .event-card { padding: 14px 16px; border-bottom: 1px solid #27272a; cursor: pointer; transition: background 0.15s; }
        .event-card:hover, .event-card.active { background: #27272a; }
        .event-card .title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .event-card .meta { font-size: 12px; color: #a1a1aa; display: flex; gap: 12px; flex-wrap: wrap; }
        .severity { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .severity.low { background: #064e3b; color: #6ee7b7; }
        .severity.medium { background: #78350f; color: #fbbf24; }
        .severity.high { background: #7f1d1d; color: #fca5a5; }
        .main { overflow-y: auto; padding: 24px; }
        .detail-header { margin-bottom: 20px; }
        .detail-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .info-card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px; }
        .info-card .label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .info-card .value { font-size: 18px; font-weight: 600; }
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px; }
        .frames-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .frame-card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; overflow: hidden; }
        .frame-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; cursor: pointer; }
        .frame-card .frame-info { padding: 8px 12px; font-size: 12px; color: #a1a1aa; }
        .tabs { display: flex; gap: 0; margin-bottom: 16px; }
        .tab { padding: 8px 16px; background: #27272a; border: 1px solid #3f3f46; cursor: pointer; font-size: 13px; color: #a1a1aa; }
        .tab:first-child { border-radius: 6px 0 0 6px; }
        .tab:last-child { border-radius: 0 6px 6px 0; }
        .tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        #map { height: 300px; border-radius: 8px; margin-bottom: 20px; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #71717a; }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }
        .objects-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .object-badge { background: #27272a; border: 1px solid #3f3f46; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎥 Dashcam Analytics</h1>
        <span class="badge" id="event-count">0 events</span>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="filters">
                <select id="filter-severity" onchange="loadEvents()">
                    <option value="">All Severity</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <select id="filter-object" onchange="loadEvents()">
                    <option value="">All Objects</option>
                    <option value="person">Person</option>
                    <option value="car">Car</option>
                    <option value="truck">Truck</option>
                    <option value="bicycle">Bicycle</option>
                    <option value="motorcycle">Motorcycle</option>
                    <option value="bus">Bus</option>
                </select>
            </div>
            <div id="events-list"></div>
        </div>
        <div class="main" id="main-content">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                <p>Select an event to view details</p>
            </div>
        </div>
    </div>
    <div id="lightbox" class="lightbox" style="display:none" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" />
    </div>

    <script>
        let map = null;
        let geoLayer = null;

        async function loadEvents() {
            const sev = document.getElementById('filter-severity').value;
            const obj = document.getElementById('filter-object').value;
            let url = '/api/events?';
            if (sev) url += `severity=${sev}&`;
            if (obj) url += `object_type=${obj}&`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('event-count').textContent = `${data.total_events} events`;
            const list = document.getElementById('events-list');
            list.innerHTML = data.events.map(e => `
                <div class="event-card" onclick="loadEvent('${e.event_id}')" id="card-${e.event_id}">
                    <div class="title">${e.event_id} <span class="severity ${e.severity_level}">${e.severity_level}</span></div>
                    <div class="meta">
                        <span>Score: ${e.severity_score}</span>
                        <span>${e.num_frames} frames</span>
                        <span>${e.source_video || ''}</span>
                    </div>
                    <div class="meta" style="margin-top:4px">
                        ${Object.entries(e.object_counts || {}).map(([k,v]) => `<span>${k}: ${v}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function loadEvent(eventId) {
            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById(`card-${eventId}`);
            if (card) card.classList.add('active');

            const res = await fetch(`/api/events/${eventId}`);
            const data = await res.json();
            const m = data.metadata;
            const sev = m.severity || {};
            const factors = sev.factors || {};

            let html = `
                <div class="detail-header">
                    <h2>${eventId} <span class="severity ${sev.severity_level || 'low'}">${sev.severity_level || 'low'} (${sev.severity_score || 0})</span></h2>
                </div>
                <div class="info-grid">
                    <div class="info-card"><div class="label">Start Time</div><div class="value">${m.start_time?.toFixed(1) || '-'}s</div></div>
                    <div class="info-card"><div class="label">End Time</div><div class="value">${m.end_time?.toFixed(1) || '-'}s</div></div>
                    <div class="info-card"><div class="label">Frames</div><div class="value">${m.num_frames || 0}</div></div>
                    <div class="info-card"><div class="label">Risk Factor</div><div class="value">${factors.object_risk || 0}</div></div>
                    <div class="info-card"><div class="label">Proximity</div><div class="value">${factors.proximity || 0}</div></div>
                    <div class="info-card"><div class="label">Density</div><div class="value">${factors.density || 0}</div></div>
                </div>
            `;

            // Object summary
            const counts = m.object_counts || {};
            if (Object.keys(counts).length) {
                html += `<div class="section-title">Detected Objects</div><div class="objects-list">`;
                for (const [cls, count] of Object.entries(counts)) {
                    html += `<span class="object-badge">${cls}: ${count}</span>`;
                }
                html += `</div>`;
            }

            // Map
            html += `<div class="section-title">Location</div><div id="map"></div>`;

            // Frame tabs
            html += `
                <div class="tabs">
                    <div class="tab active" onclick="showFrames('${eventId}', 'frames', this)">Frames</div>
                    <div class="tab" onclick="showFrames('${eventId}', 'annotated', this)">Annotated</div>
                </div>
                <div class="frames-grid" id="frames-container">
            `;

            data.frames.forEach((f, i) => {
                const fm = (m.frame_metadata && m.frame_metadata[i]) || {};
                html += `
                    <div class="frame-card">
                        <img src="/api/events/${eventId}/frames/${f}" onclick="showLightbox(this.src)" loading="lazy" />
                        <div class="frame-info">
                            ${f}
                            ${fm.latitude ? ` | ${fm.latitude.toFixed(5)}, ${fm.longitude.toFixed(5)}` : ''}
                            ${fm.speed ? ` | ${fm.speed} km/h` : ''}
                        </div>
                    </div>
                `;
            });
            html += `</div>`;

            document.getElementById('main-content').innerHTML = html;

            // Init map
            setTimeout(async () => {
                const geoRes = await fetch('/api/geojson');
                const geo = await geoRes.json();
                const mapEl = document.getElementById('map');
                if (!mapEl) return;
                map = L.map('map').setView([0, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                const eventFeatures = geo.features.filter(f => f.properties.event_id === eventId);
                if (eventFeatures.length) {
                    const layer = L.geoJSON({type: 'FeatureCollection', features: eventFeatures}, {
                        style: { color: '#3b82f6', weight: 3 }
                    }).addTo(map);
                    map.fitBounds(layer.getBounds(), { padding: [30, 30] });
                }
            }, 100);
        }

        async function showFrames(eventId, type, tabEl) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            const res = await fetch(`/api/events/${eventId}`);
            const data = await res.json();
            const frames = type === 'annotated' ? data.annotated_frames : data.frames;
            const prefix = type === 'annotated' ? 'annotated' : 'frames';
            const container = document.getElementById('frames-container');
            container.innerHTML = frames.map(f => `
                <div class="frame-card">
                    <img src="/api/events/${eventId}/${prefix}/${f}" onclick="showLightbox(this.src)" loading="lazy" />
                    <div class="frame-info">${f}</div>
                </div>
            `).join('');
        }

        function showLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        loadEvents();
    </script>
</body>
</html>
